; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
lib_deps = arduino-libraries/SD
; Default SD chip-select pin (override here if your shield uses a different pin)
build_flags = -DSD_CS_PIN=10
; Only the on-board smoke test runs in this environment.
test_filter = test_embedded_smoke

; Native environment for host-side unit tests (pure C++ logic, no Arduino hardware).
; Run with: pio test -e native
[env:native]
platform = native
test_build_src = no
build_flags =
    -std=gnu++17
    -I include
; Exclude the on-board smoke test — it requires Arduino APIs and serial upload.
test_ignore = test_embedded_smoke
